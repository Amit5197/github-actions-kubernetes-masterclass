name: Build and Test Go Application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # 3. Clean dependencies AND run tests inside the correct folder
      - name: Tidy, Test, and Vet
        run: |
          go mod tidy
          go test ./...
          go vet ./...
        working-directory: ./skillpulse  # <--- CHANGE THIS to your exact Go folder name
