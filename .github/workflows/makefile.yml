name: Build and Test Go Application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up the Go environment on the runner
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # You can change this to your specific Go version

      # Step 3: Fix the missing dependencies (This resolves your error!)
      - name: Tidy Go Modules
        run: go mod tidy

      # Step 4: Run your tests successfully
      - name: Run Go test
        run: go test ./...

      # Step 5: Run Go vet
      - name: Run Go vet
        run: go vet ./...
