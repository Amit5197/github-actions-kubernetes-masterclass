name: Build and Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ⬇️ ADD THIS BLOCK TO TELL THE RUNNER WHERE YOUR FILES ARE ⬇️
    defaults:
      run:
        working-directory: ./your-subfolder-name   # Replace with your actual folder name

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make configure executable
        run: chmod +x ./configure

      - name: Run configure
        run: ./configure

      - name: Run Makefile build
        run: make

      - name: Run tests
        run: make test
