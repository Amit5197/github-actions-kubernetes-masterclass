name: Secrets Scan

on:
  workflow_call:
  workflow_dispatch:

jobs:
  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          # Automatically generated by GitHub Actions for this workflow run.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
